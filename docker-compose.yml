version: '3.9'

services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wikidb
      POSTGRES_USER: wikiuser
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://wikiuser:secret@db:5432/wikidb

volumes:
  postgres_data: